name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Race Test
        run: go test -race ./...

      - name: Build
        run: go build ./...
