name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT_DIR="dist/${GOOS}_${GOARCH}"
          mkdir -p "${OUT_DIR}/brain"
          BIN_NAME="brain"
          ARCHIVE_EXT="tar.gz"
          if [ "${GOOS}" = "windows" ]; then
            BIN_NAME="brain.exe"
            ARCHIVE_EXT="zip"
          fi
          go build \
            -ldflags="-s -w -X 'brain/internal/buildinfo.Version=${TAG}' -X 'brain/internal/buildinfo.Commit=${GITHUB_SHA}' -X 'brain/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" \
            -o "${OUT_DIR}/brain/${BIN_NAME}" .
          if [ "${GOOS}" = "windows" ]; then
            (cd "${OUT_DIR}/brain" && zip -q "../../../dist/brain_${TAG}_${GOOS}_${GOARCH}.${ARCHIVE_EXT}" "${BIN_NAME}")
          else
            tar -C "${OUT_DIR}/brain" -czf "dist/brain_${TAG}_${GOOS}_${GOARCH}.${ARCHIVE_EXT}" "${BIN_NAME}"
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/brain_${{ github.ref_name }}_${{ matrix.os }}_${{ matrix.arch }}.*

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum brain_${GITHUB_REF_NAME}_*.* > "brain_${GITHUB_REF_NAME}_checksums.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/brain_${{ github.ref_name }}_*.tar.gz
            dist/brain_${{ github.ref_name }}_*.zip
            dist/brain_${{ github.ref_name }}_checksums.txt
